<svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F1E7D6"/>
      <stop offset="1" stop-color="#D8B98A"/>
    </linearGradient>
    <filter id="fc" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="55"/></filter>
    <radialGradient id="chest" cx="0.38" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#9A6636"/>
      <stop offset="1" stop-color="#4E3116"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#gc)"/>

  <g filter="url(#fc)" opacity="0.4">
    <circle cx="180" cy="140" r="150" fill="#FFFFFF"/>
    <circle cx="650" cy="470" r="180" fill="#B08B4F"/>
    <circle cx="430" cy="330" r="150" fill="#8FB79E"/>
  </g>

  <!-- rama con hojas -->
  <g transform="translate(150 80)">
    <path d="M110 20 C60 150 70 320 160 460" fill="none" stroke="#2B3D2E" stroke-opacity="0.5" stroke-width="6" stroke-linecap="round"/>
    <g fill="#4C7A52" fill-opacity="0.9">
      <g transform="translate(92 110) rotate(-40)"><path d="M0 0 C40 -30 100 -30 140 0 C100 30 40 30 0 0 Z"/></g>
      <g transform="translate(86 220) rotate(36)"><path d="M0 0 C40 -30 100 -30 140 0 C100 30 40 30 0 0 Z"/></g>
    </g>
  </g>

  <!-- castana grande -->
  <g transform="translate(480 400)" stroke="#3A2410" stroke-opacity="0.25" stroke-width="2">
    <path d="M-8 -66 L0 -92 L8 -66 Z" fill="#6E4A2A"/>
    <path d="M0 -70 C45 -70 66 -30 66 15 C66 58 36 82 0 82 C-36 82 -66 58 -66 15 C-66 -30 -45 -70 0 -70 Z" fill="url(#chest)"/>
    <ellipse cx="0" cy="58" rx="34" ry="20" fill="#C9A06A" fill-opacity="0.75" stroke="none"/>
  </g>

  <!-- castana pequena -->
  <g transform="translate(590 470) scale(0.72)" stroke="#3A2410" stroke-opacity="0.25" stroke-width="2">
    <path d="M-8 -66 L0 -92 L8 -66 Z" fill="#6E4A2A"/>
    <path d="M0 -70 C45 -70 66 -30 66 15 C66 58 36 82 0 82 C-36 82 -66 58 -66 15 C-66 -30 -45 -70 0 -70 Z" fill="url(#chest)"/>
    <ellipse cx="0" cy="58" rx="34" ry="20" fill="#C9A06A" fill-opacity="0.75" stroke="none"/>
  </g>
</svg>
