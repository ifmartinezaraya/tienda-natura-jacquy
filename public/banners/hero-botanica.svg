<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#7A3B2E"/>
      <stop offset="0.55" stop-color="#C1734A"/>
      <stop offset="1" stop-color="#F0C79A"/>
    </linearGradient>
    <filter id="softB" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bgB)"/>

  <g filter="url(#softB)" opacity="0.5">
    <circle cx="1200" cy="240" r="240" fill="#F3CE9E"/>
    <circle cx="1430" cy="700" r="220" fill="#D98A4E"/>
  </g>

  <!-- escenario blanco organico -->
  <g fill="#FBF6EF">
    <ellipse cx="1200" cy="640" rx="500" ry="330" opacity="0.92"/>
    <ellipse cx="1010" cy="560" rx="280" ry="220" opacity="0.55"/>
  </g>

  <!-- pote de crema + frasco -->
  <g stroke="#5A2E20" stroke-opacity="0.18" stroke-width="2">
    <!-- pote ancho -->
    <g>
      <rect x="1020" y="470" width="200" height="190" rx="40" fill="#E7C79A"/>
      <rect x="1040" y="432" width="160" height="46" rx="16" fill="#B98A52"/>
      <ellipse cx="1120" cy="470" rx="80" ry="14" fill="#F3E7D2"/>
    </g>
    <!-- frasco alto -->
    <g>
      <rect x="1270" y="360" width="130" height="300" rx="32" fill="#CF8A6A"/>
      <rect x="1316" y="330" width="44" height="34" rx="6" fill="#9A5A3E"/>
      <rect x="1300" y="292" width="76" height="44" rx="14" fill="#6E3A2A"/>
    </g>
  </g>

  <!-- rama de hojas -->
  <g transform="translate(900 300)">
    <path d="M60 40 C20 150 30 300 110 420" fill="none" stroke="#2B3D2E" stroke-opacity="0.5" stroke-width="5" stroke-linecap="round"/>
    <g fill="#4C7A52" fill-opacity="0.9">
      <g transform="translate(52 110) rotate(-40)"><path d="M0 0 C34 -26 86 -26 120 0 C86 26 34 26 0 0 Z"/></g>
      <g transform="translate(44 210) rotate(36)"><path d="M0 0 C34 -26 86 -26 120 0 C86 26 34 26 0 0 Z"/></g>
      <g transform="translate(60 310) rotate(-34)"><path d="M0 0 C32 -24 82 -24 114 0 C82 24 32 24 0 0 Z"/></g>
    </g>
  </g>

  <g fill="#FBF6EF" fill-opacity="0.6">
    <circle cx="1490" cy="360" r="5"/>
    <circle cx="980" cy="740" r="5"/>
  </g>
</svg>
