<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F1E7EC"/>
      <stop offset="1" stop-color="#E5DAE6"/>
    </linearGradient>
    <filter id="blur3" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <linearGradient id="liq3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C79A4E"/>
      <stop offset="1" stop-color="#A9645F"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg3)"/>

  <g filter="url(#blur3)">
    <circle cx="1240" cy="220" r="300" fill="#7A5B8A" opacity="0.4"/>
    <circle cx="1410" cy="730" r="280" fill="#C98B87" opacity="0.5"/>
    <circle cx="980" cy="640" r="220" fill="#C79A4E" opacity="0.3"/>
  </g>

  <!-- frasco de perfume -->
  <g stroke="#2B3D2E" stroke-opacity="0.4" stroke-width="3" stroke-linejoin="round">
    <rect x="1095" y="440" width="210" height="240" rx="30" fill="#FFFFFF" fill-opacity="0.9"/>
    <path d="M1095 560 h210 v90 a30 30 0 0 1 -30 30 h-150 a30 30 0 0 1 -30 -30 z" fill="url(#liq3)" stroke="none"/>
    <rect x="1170" y="404" width="60" height="40" rx="6" fill="#F0E6D6"/>
    <rect x="1158" y="352" width="84" height="56" rx="10" fill="#7A5B8A" stroke="none"/>
    <rect x="1188" y="330" width="24" height="28" rx="6" fill="#7A5B8A" stroke="none"/>
  </g>

  <!-- ramita -->
  <g transform="translate(1330 470) rotate(18)">
    <path d="M0 0 q70 -20 150 -6" fill="none" stroke="#4C7A52" stroke-opacity="0.7" stroke-width="4" stroke-linecap="round"/>
    <g fill="#4C7A52" fill-opacity="0.85">
      <ellipse cx="50" cy="-14" rx="26" ry="12" transform="rotate(-20 50 -14)"/>
      <ellipse cx="95" cy="-16" rx="26" ry="12" transform="rotate(-16 95 -16)"/>
      <ellipse cx="138" cy="-10" rx="24" ry="11" transform="rotate(-10 138 -10)"/>
    </g>
  </g>

  <!-- destellos -->
  <g stroke="#2B3D2E" stroke-opacity="0.3" stroke-width="3" stroke-linecap="round">
    <path d="M920 300 v26 M907 313 h26"/>
    <path d="M1450 340 v20 M1440 350 h20"/>
    <path d="M980 780 v18 M971 789 h18"/>
  </g>
</svg>
