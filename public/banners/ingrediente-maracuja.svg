<svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF3DE"/>
      <stop offset="1" stop-color="#E6C86A"/>
    </linearGradient>
    <filter id="fm" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="55"/></filter>
    <radialGradient id="rind" cx="0.38" cy="0.32" r="0.9">
      <stop offset="0" stop-color="#E0A84A"/>
      <stop offset="1" stop-color="#8A4A22"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#gm)"/>

  <g filter="url(#fm)" opacity="0.4">
    <circle cx="180" cy="140" r="150" fill="#FFFFFF"/>
    <circle cx="650" cy="470" r="180" fill="#D99A3E"/>
    <circle cx="430" cy="330" r="150" fill="#8FB79E"/>
  </g>

  <!-- hoja -->
  <g transform="translate(150 150) rotate(20)">
    <path d="M0 0 C60 -46 150 -46 210 0 C150 46 60 46 0 0 Z" fill="#4C7A52" fill-opacity="0.85"/>
    <path d="M10 0 H200" stroke="#2B3D2E" stroke-opacity="0.3" stroke-width="3" fill="none"/>
  </g>

  <!-- maracuya entero -->
  <g transform="translate(455 410)">
    <circle r="78" fill="url(#rind)" stroke="#5A2E14" stroke-opacity="0.25" stroke-width="2"/>
    <ellipse cx="-24" cy="-28" rx="22" ry="14" fill="#F0C77A" fill-opacity="0.5"/>
    <path d="M0 -78 q10 -18 -4 -30" fill="none" stroke="#4C7A52" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- maracuya en mitad (pulpa) -->
  <g transform="translate(585 460)">
    <circle r="88" fill="#9A5A2E" stroke="#5A2E14" stroke-opacity="0.25" stroke-width="2"/>
    <circle r="74" fill="#F1E6B4"/>
    <circle r="58" fill="#E9C24E"/>
    <g fill="#3A2A16">
      <ellipse cx="-20" cy="-18" rx="6" ry="8" transform="rotate(20 -20 -18)"/>
      <ellipse cx="8" cy="-26" rx="6" ry="8" transform="rotate(-10 8 -26)"/>
      <ellipse cx="26" cy="-4" rx="6" ry="8" transform="rotate(30 26 -4)"/>
      <ellipse cx="-28" cy="10" rx="6" ry="8" transform="rotate(-20 -28 10)"/>
      <ellipse cx="-6" cy="16" rx="6" ry="8" transform="rotate(10 -6 16)"/>
      <ellipse cx="18" cy="26" rx="6" ry="8" transform="rotate(-25 18 26)"/>
      <ellipse cx="0" cy="-4" rx="6" ry="8"/>
      <ellipse cx="34" cy="-24" rx="6" ry="8" transform="rotate(15 34 -24)"/>
    </g>
  </g>
</svg>
