<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#8E3B4A"/>
      <stop offset="0.55" stop-color="#C56B5E"/>
      <stop offset="1" stop-color="#F0A97F"/>
    </linearGradient>
    <filter id="softA" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bgA)"/>

  <!-- brillos suaves -->
  <g filter="url(#softA)" opacity="0.5">
    <circle cx="1180" cy="240" r="240" fill="#F4C39E"/>
    <circle cx="1420" cy="700" r="220" fill="#E88F73"/>
  </g>

  <!-- escenario blanco organico -->
  <g fill="#FBF6EF">
    <ellipse cx="1180" cy="640" rx="500" ry="330" opacity="0.92"/>
    <ellipse cx="1360" cy="560" rx="300" ry="240" opacity="0.6"/>
  </g>

  <!-- trio de frascos minimalistas -->
  <g stroke="#7A2E3A" stroke-opacity="0.18" stroke-width="2">
    <!-- frasco 1 -->
    <g>
      <rect x="980" y="410" width="120" height="250" rx="30" fill="#E6B27F"/>
      <rect x="1018" y="384" width="44" height="30" rx="6" fill="#B87A45"/>
      <rect x="1006" y="352" width="68" height="40" rx="12" fill="#8A5A34"/>
    </g>
    <!-- frasco 2 (alto, central) -->
    <g>
      <rect x="1130" y="330" width="140" height="330" rx="34" fill="#D98A86"/>
      <rect x="1178" y="300" width="44" height="34" rx="6" fill="#A9645F"/>
      <rect x="1160" y="262" width="80" height="46" rx="14" fill="#7A3A44"/>
    </g>
    <!-- frasco 3 (bajo) -->
    <g>
      <rect x="1300" y="470" width="110" height="190" rx="28" fill="#F1E2D2"/>
      <rect x="1336" y="446" width="40" height="28" rx="6" fill="#C99E77"/>
      <rect x="1322" y="416" width="66" height="38" rx="12" fill="#A9645F"/>
    </g>
  </g>

  <!-- hoja minimalista -->
  <g transform="translate(1420 430) rotate(28)">
    <path d="M0 0 C46 -34 116 -34 162 0 C116 34 46 34 0 0 Z" fill="#4C7A52" fill-opacity="0.85"/>
    <path d="M8 0 H154" stroke="#2B3D2E" stroke-opacity="0.3" stroke-width="3" fill="none"/>
  </g>

  <!-- puntos -->
  <g fill="#FBF6EF" fill-opacity="0.6">
    <circle cx="900" cy="300" r="6"/>
    <circle cx="1480" cy="360" r="5"/>
    <circle cx="960" cy="720" r="5"/>
  </g>
</svg>
