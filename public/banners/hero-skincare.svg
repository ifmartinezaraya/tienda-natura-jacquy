<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F3ECDD"/>
      <stop offset="1" stop-color="#E6DAC5"/>
    </linearGradient>
    <filter id="blur1" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <linearGradient id="liq1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D7A39C"/>
      <stop offset="1" stop-color="#C98B87"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg1)"/>

  <!-- blobs organicos -->
  <g filter="url(#blur1)">
    <circle cx="1230" cy="210" r="300" fill="#C98B87" opacity="0.55"/>
    <circle cx="1400" cy="740" r="280" fill="#B08B4F" opacity="0.45"/>
    <circle cx="980" cy="640" r="230" fill="#4C7A52" opacity="0.22"/>
  </g>

  <!-- frasco serum con gotario -->
  <g stroke="#2B3D2E" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <rect x="1100" y="430" width="200" height="250" rx="40" fill="#FFFFFF" fill-opacity="0.92"/>
    <path d="M1200 430 v250" fill="none" stroke="none"/>
    <path d="M1100 560 h200 v80 a40 40 0 0 1 -40 40 h-120 a40 40 0 0 1 -40 -40 z" fill="url(#liq1)" stroke="none"/>
    <rect x="1170" y="392" width="60" height="42" rx="8" fill="#F3E7DE"/>
    <rect x="1150" y="330" width="100" height="66" rx="14" fill="#A9645F" stroke="none"/>
    <rect x="1178" y="300" width="44" height="40" rx="16" fill="#A9645F" stroke="none"/>
  </g>

  <!-- hoja -->
  <g transform="translate(1310 470) rotate(24)">
    <path d="M0 0 C60 -46 150 -46 210 0 C150 46 60 46 0 0 Z" fill="#4C7A52" fill-opacity="0.85"/>
    <path d="M8 0 H202" stroke="#2B3D2E" stroke-opacity="0.35" stroke-width="3" fill="none"/>
  </g>

  <!-- puntos decorativos -->
  <g fill="#2B3D2E" fill-opacity="0.25">
    <circle cx="900" cy="300" r="7"/>
    <circle cx="960" cy="360" r="5"/>
    <circle cx="1430" cy="330" r="6"/>
    <circle cx="1010" cy="760" r="6"/>
  </g>
</svg>
